# One-command run:  docker compose up
# Then open http://localhost:8000
services:
  drumscribe:
    build: .
    image: drumscribe
    container_name: drumscribe
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
